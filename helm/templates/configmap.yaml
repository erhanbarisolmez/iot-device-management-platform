apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart.fullname" . }}-config
  labels:
    {{- include "chart.labels" . | nindent 4 }}
data:
  SPRING_APPLICATION_NAME: {{ include "chart.name" . }}
  KAFKA_BOOTSTRAP_SERVERS: {{ .Values.env.KAFKA_BOOTSTRAP_SERVERS | quote }}
  KAFKA_SCHEMA_REGISTRY_URL: {{ .Values.env.KAFKA_SCHEMA_REGISTRY_URL | quote }}
  MQTT_BROKER_URL: {{ .Values.env.MQTT_BROKER_URL | quote }}
