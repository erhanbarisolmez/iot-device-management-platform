replicaCount: 1

image:
  repository: erhanbarisolmez/iot-device-management-platform
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 1024Mi
  requests:
    cpu: 250m
    memory: 512Mi

env:
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  KAFKA_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/smartlock"
  SPRING_DATASOURCE_USERNAME: "postgres"
  SPRING_DATASOURCE_PASSWORD: "postgres"
  MQTT_BROKER_URL: "tcp://mosquitto:1883"
  JWT_SECRET_KEY: "change-me-secret"
  TWILIO_ACCOUNT_SID: "change-me"
  TWILIO_AUTH_TOKEN: "change-me"
  TWILIO_PHONE_NUMBER: "+1234567890"
  IYZICO_API_KEY: "change-me"
  IYZICO_SECRET_KEY: "change-me"

livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: smartlock.local
  tls: []

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
